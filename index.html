function togSel(id){if(selIds[id])delete selIds[id];else selIds[id]=1;render();}
function juntarNota(){const ids=Object.keys(selIds);const its=movs.filter(m=>ids.includes(m.id)&&m.tipo==='COMPRA');

function togGrupo(k){consGrupoFech[k]=!consGrupoFech[k];render();}
function togTodosGrupos(){if(Object.keys(consGrupoFech).length)consGrupoFech={};else _gKeys.forEach(k=>consGrupoFech[k]=true);render();}
function togCt(k){ctExp[k]=!ctExp[k];render();}

const CATB={'ETB':9,'Booster Box':36,'Box da Coleção':10,'Mini BB':6,'Quad':4,'Triple':3,'Sleeved':1,'Blister':1,'Case':0,'Single/Carta':0,'Outro':0};
movs.forEach(m=>{if(m.cat&&!cats.includes(m.cat))cats.push(m.cat);if(m.colecao&&!cols.includes(m.colecao))cols.push(m.colecao);if(m.contraparte&&!pess.includes(m.contraparte))pess.push(m.contraparte);});
if(!colsJ){colsJ={};jogos.forEach(j=>colsJ[j]=[]);movs.forEach(m=>{const j=m.jogo||'Pokémon';if(!colsJ[j])colsJ[j]=[];if(m.colecao&&!colsJ[j].includes(m.colecao))colsJ[j].push(m.colecao);});if(!colsJ['Pokémon'])colsJ['Pokémon']=[];cols.forEach(c=>{if(!colsJ['Pokémon'].includes(c))colsJ['Pokémon'].push(c);});salvarColsJ();}
const fmt=n=>'R$ '+(Math.round(n*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?'+':'')+Math.round(n*100)+'%';

function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1600);}
const sitDe=m=>m.situacao||(m.destino==='Coleção'?'Coleção':'Em estoque');
function baixarLote(loteId,qtdBaixa,novaSit,extras){const lote=movs.find(m=>m.id===loteId);if(!lote)return null;const qtd=+lote.qtd||1,vUnit=(+lote.valor||0)/qtd;qtdBaixa=Math.max(1,Math.min(qtdBaixa,qtd));const destDe=s=>s==='Coleção'?'Coleção':(s==='Vendido'||s==='Trocado'?'Vender':lote.destino);
  if(!lote.destIni)lote.destIni=(sitDe(lote)==='Coleção'?'Coleção':'Em estoque');
  if(qtdBaixa>=qtd){lote.situacao=novaSit;lote.destino=destDe(novaSit);if(extras)Object.assign(lote,extras);return lote;}
  lote.qtd=qtd-qtdBaixa;lote.valor=Math.round((qtd-qtdBaixa)*vUnit*100)/100;
  const ped=Object.assign({},lote,{id:'m'+Date.now()+Math.floor(Math.random()*1e4),qtd:qtdBaixa,valor:Math.round(qtdBaixa*vUnit*100)/100,situacao:novaSit,destino:destDe(novaSit),loteOrigem:loteId});if(extras)Object.assign(ped,extras);movs.push(ped);return ped;}
function baixarBoosters(loteId,nBoo,novaSit,extras){const lote=movs.find(m=>m.id===loteId);if(!lote)return null;
  const qtd=+lote.qtd||1,bpu=Math.max(1,+lote.boosters||1),tot=qtd*bpu,vLote=+lote.valor||0,vb=vLote/tot;
  nBoo=Math.max(1,Math.min(nBoo,tot));
  if(!lote.destIni)lote.destIni=(sitDe(lote)==='Coleção'?'Coleção':'Em estoque');
  const destDe=s=>s==='Coleção'?'Coleção':(s==='Vendido'||s==='Trocado'?'Vender':lote.destino);
  if(nBoo>=tot){lote.situacao=novaSit;lote.destino=destDe(novaSit);if(extras)Object.assign(lote,extras);return lote;}
  const rem=tot-nBoo,remCx=Math.floor(rem/bpu),remBoo=rem%bpu,vPed=Math.round(nBoo*vb*100)/100;
  const ped=Object.assign({},lote,{id:'m'+Date.now()+Math.floor(Math.random()*1e4),qtd:nBoo,valor:vPed,cat:'Booster',boosters:1,vUnit:Math.round(vb*100)/100,situacao:novaSit,destino:destDe(novaSit),loteOrigem:loteId});
  if(extras)Object.assign(ped,extras);
  if(remCx===0){lote.qtd=remBoo;lote.valor=Math.round((vLote-vPed)*100)/100;lote.cat='Booster';lote.boosters=1;lote.vUnit=Math.round(vb*100)/100;lote.obs=(lote.obs?lote.obs+' · ':'')+'aberto em boosters';}
  else{lote.qtd=remCx;
    if(remBoo>0){const vSol=Math.round(remBoo*vb*100)/100;
      const solto=Object.assign({},lote,{id:'m'+Date.now()+Math.floor(Math.random()*1e4)+1,qtd:remBoo,valor:vSol,cat:'Booster',boosters:1,vUnit:Math.round(vb*100)/100,loteOrigem:loteId,obs:(lote.obs?lote.obs+' · ':'')+'aberto de '+(lote.cat||'caixa')});
      movs.push(solto);lote.valor=Math.round((vLote-vPed-vSol)*100)/100;}
    else lote.valor=Math.round((vLote-vPed)*100)/100;}
  movs.push(ped);return ped;}

function unHintGen(selId,rowId,togId,hintId,un){const sel=document.getElementById(selId),row=document.getElementById(rowId);if(!sel||!row)return;const it=movs.find(m=>m.id===sel.value);const bpu=it?Math.max(1,+it.boosters||1):1;

function motor(){
  const todasC=movs.filter(m=>m.tipo==='COMPRA');
  const compras=todasC.filter(m=>noPer(m.data));
  const vendas=movs.filter(m=>m.tipo==='VENDA'&&noPer(m.data)).map(m=>({data:m.data,receita:(+m.valor||0)*(1-(+m.taxa||0)/100),bruto:+m.valor||0,m}));
  let investido=0,cmv=0;
  for(const m of compras){const v=+m.valor||0;const s=sitDe(m);if(s==='Trocado')continue;investido+=v;if(s==='Vendido')cmv+=v;}
  let estoque=0,colCusto=0;
  for(const m of todasC){const v=+m.valor||0;const s=sitDe(m);if(s==='Em estoque')estoque+=v;else if(s==='Coleção')colCusto+=v;}

function imprimir(){
  const tit=tela==='painel'?'Resumo geral':tela==='relatorios'?'Relatórios':({tudo:'Todos os lançamentos',COMPRA:'Compras',VENDA:'Vendas',ESTOQUE:'Estoque (a custo)',COLECAO:'Coleção (a custo)',DESPESA:'Despesas',CADASTRO:'Cadastros'}[consF]||'Relatório');
  const dBR2=s=>s?s.split('-').reverse().join('/'):'';
  const per=(perDe||perAte)?`Período: ${dBR2(perDe)||'início'} a ${dBR2(perAte)||'hoje'}`:'Período: tudo';
  const jg=(typeof consJogo!=='undefined'&&consJogo&&consJogo!=='todos')?` · ${consJogo}`:'';
  const h=`<div id="printHead" style="display:none"><div style="font-size:18px;font-weight:800;color:#000">Controle TCG — ${tit}${jg}</div><div style="font-size:12px;color:#444;margin-top:2px">${per}</div><div style="font-size:11px;color:#777;margin-top:1px">Gerado em ${new Date().toLocaleString('pt-BR')}</div><hr style="border:none;border-top:1px solid #ccc;margin-top:8px"></div>`;
  document.getElementById('printHead')?.remove();document.body.insertAdjacentHTML('afterbegin',h);window.print();}
function abrir(id){const m=movs.find(x=>x.id===id);if(!m)return;navHist.push(snap());tipoSel=m.tipo;editId=id;tela='lancar';render();}
function excluir(id){const m=movs.find(x=>x.id===id);
  if(m&&m.serieId&&m.status==='apagar'){const n=movs.filter(x=>x.serieId===m.serieId&&x.data>=m.data&&x.status==='apagar').length;
    if(!confirm(`É uma despesa fixa. Excluir esta e as próximas previsões a pagar (${n} no total)?`))return;
    movs=movs.filter(x=>!(x.serieId===m.serieId&&x.data>=m.data&&x.status==='apagar'));save();render();return;}
  if(m&&m.tipo==='COMPRA'&&(sitDe(m)==='Em estoque'||sitDe(m)==='Coleção')){
    if(!confirm('⚠️ Excluir apaga a COMPRA e o CUSTO dela dos números — como se você nunca tivesse comprado.\n\nUse só pra lançamento ERRADO. Se o item saiu de verdade (vendeu, guardou, trocou), use o botão certo — o custo fica registrado.\n\nExcluir mesmo assim?'))return;
    movs=movs.filter(x=>x.id!==id);save();render();toast('Compra excluída (custo removido)');return;}
  if(confirm('Excluir este lançamento?')){movs=movs.filter(x=>x.id!==id);save();render();}}
function marcarPago(id){const m=movs.find(x=>x.id===id);if(m){m.status='pago';m.dataPagamento=new Date().toISOString().slice(0,10);save();render();}}
function toggleExp(id){expandId=expandId===id?null:id;render();}
function mudarSit(id){const m=movs.find(x=>x.id===id);if(!m||m.tipo!=='COMPRA')return;const ORD=['Em estoque','Vendido','Coleção'];const px=ORD[(ORD.indexOf(sitDe(m))+1)%3];m.situacao=px;m.destino=px==='Coleção'?'Coleção':'Vender';save();toast('Agora: '+px);render();}
function salvarNuvem(){if(!_db||!_syncReady)return;_db.collection('controle').doc('dados').set({movs,jogos,cats,cols,colsJ,colsG,pess,pgs,despCats,cadastros,_upd:Date.now(),_by:_userEmail}).catch(e=>console.warn('nuvem:',e&&e.message));}
function aplicarNuvem(d){if(!d)return;if(Array.isArray(d.movs))movs=d.movs;if(Array.isArray(d.jogos))jogos=d.jogos;if(Array.isArray(d.cats))cats=d.cats;if(Array.isArray(d.cols))cols=d.cols;if(d.colsJ&&typeof d.colsJ==='object')colsJ=d.colsJ;if(d.colsG&&typeof d.colsG==='object')colsG=d.colsG;if(Array.isArray(d.pess))pess=d.pess;if(Array.isArray(d.pgs))pgs=d.pgs;if(Array.isArray(d.despCats))despCats=d.despCats;if(Array.isArray(d.cadastros))cadastros=d.cadastros;localStorage.setItem(MK,JSON.stringify(movs));render();}
function loginGoogle(){_auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert('Erro no login: '+(e&&e.message)));}
function sairConta(){if(_auth&&confirm('Sair da conta?')){_syncReady=false;_auth.signOut();}}
function telaLogin(msg){const v=document.getElementById('view');if(v)v.innerHTML=`<div class="card" style="text-align:center;margin:46px auto 0;max-width:360px"><div style="font-size:32px">🃏</div><div class="head" style="justify-content:center;margin-top:6px">Controle TCG</div><div class="ctx">Entre pra acessar seu controle sincronizado em qualquer aparelho.</div>${msg?`<div class="soon" style="color:var(--red);justify-content:center">${msg}</div>`:''}<button class="btn" style="margin-top:16px" onclick="loginGoogle()">Entrar com Google</button></div>`;document.querySelectorAll('nav button,.htop').forEach(b=>b.style.display='none');const bv=document.getElementById('btnVoltar');if(bv)bv.style.display='none';}
function bootNuvem(){try{firebase.initializeApp(firebaseConfig);}catch(e){}_auth=firebase.auth();_db=firebase.firestore();telaLogin('');
  _auth.onAuthStateChanged(u=>{
    if(u&&EMAILS_OK.map(x=>(x||'').toLowerCase()).includes((u.email||'').toLowerCase())){_userEmail=u.email;
      _db.collection('controle').doc('dados').onSnapshot(s=>{const primeiro=!_syncReady;_syncReady=true;if(s.exists)aplicarNuvem(s.data());else salvarNuvem();if(primeiro){document.querySelectorAll('nav button,.htop').forEach(b=>b.style.display='');go('painel');}},e=>telaLogin('Erro de conexão: '+(e&&e.message)));
    }else if(u){_syncReady=false;telaLogin('Sem acesso: '+(u.email||'')+' não está autorizado. Peça pro Felype liberar.');}
    else{_syncReady=false;telaLogin('');}});}
if(USAR_NUVEM){bootNuvem();}
else{if(!localStorage.getItem('tcg_seed_v1')&&Array.isArray(SEED)&&SEED.length){movs=SEED.map(m=>({...m}));save();localStorage.setItem('tcg_seed_v1','1');}render();}
</script>
</body>
</html>
