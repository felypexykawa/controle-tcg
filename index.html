<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1F3864" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#11161d" media="(prefers-color-scheme: dark)">
<title>Controle TCG</title>
<style>
:root{--navy:#1F3864;--blue:#3a6fc4;--green:#2E7D32;--red:#C0392B;--amber:#B9770E;--purple:#7d3c98;
  --bg:#F4F5F7;--card:#fff;--card2:#fafbfc;--line:#E3E6EA;--inp:#fff;--inpb:#cfd5dd;--txt:#1c2430;--mut:#6b7480;
  --okbg:#E7F4EA;--nobg:#FBEAEA;--infobg:#EAF1FB}
@media(prefers-color-scheme:dark){:root{--navy:#11161d;--blue:#5b8fe0;--green:#5bc46a;--red:#e8736a;--amber:#e0a93c;--purple:#bd8be0;
  --bg:#0d1117;--card:#161b22;--card2:#1b212b;--line:#2a313c;--inp:#0d1117;--inpb:#384150;--txt:#e6edf3;--mut:#9aa4b2;
  --okbg:#13241a;--nobg:#2a1718;--infobg:#15233a}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:74px;font-size:15px}
header{background:var(--navy);color:#fff;padding:13px 16px;position:sticky;top:0;z-index:5}
header h1{font-size:16px;font-weight:600}header .sub{font-size:12px;opacity:.75;margin-top:1px}
.htop{background:rgba(255,255,255,.13);border:none;color:#fff;border-radius:9px;padding:6px 9px;font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;line-height:1.1}
.htop svg{width:19px;height:19px}.htop.main{background:var(--blue)}.htop.on{outline:2px solid rgba(255,255,255,.6)}
.wrap{padding:14px;max-width:560px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.seg{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:3px}
.seg button{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:22px;padding:9px 16px;font-size:14px;cursor:pointer}
.seg button.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.sec{font-size:12px;color:var(--mut);font-weight:600;margin:14px 2px 8px;text-transform:uppercase;letter-spacing:.4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
.mini.click{cursor:pointer}.mini.click:active{background:var(--card2)}
.mini .k{font-size:12px;color:var(--mut)}.mini .v{font-size:19px;font-weight:600;margin-top:3px}
.mini .s{font-size:11px;color:var(--mut);margin-top:1px}
label{display:block;font-size:13px;color:var(--mut);margin:11px 0 4px}
input,select{width:100%;font-size:15px;font-family:inherit;border:1px solid var(--inpb);border-radius:10px;padding:10px;background:var(--inp);color:var(--txt)}
input:focus,select:focus{outline:none;border-color:var(--blue)}
.types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.tbtn{padding:12px;border-radius:11px;border:2px solid var(--line);background:var(--card);color:var(--txt);text-align:center;font-size:14px;font-weight:500;cursor:pointer}
.tbtn.on{border-color:var(--blue);background:var(--infobg);color:var(--blue)}
.toggle{display:flex;gap:6px}.toggle .o{flex:1;text-align:center;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:13px;cursor:pointer}
.toggle .o.on{background:var(--infobg);color:var(--blue);border-color:var(--blue);font-weight:500}
.req::after{content:" *";color:var(--red)}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:600;margin-top:15px;cursor:pointer}
.btn.g{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.calc{background:var(--infobg);border-radius:10px;padding:10px;margin-top:12px;font-size:13px;color:var(--blue)}
.item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.item .ttl{font-size:14px;font-weight:500}.item .meta{font-size:12px;color:var(--mut);margin-top:2px}
.item .obs{font-size:12px;color:var(--amber);margin-top:3px;font-style:italic}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.tag.c{background:var(--infobg);color:var(--blue)}.tag.v{background:var(--okbg);color:var(--green)}.tag.t{background:rgba(185,119,14,.15);color:var(--amber)}.tag.k{background:rgba(125,60,152,.15);color:var(--purple)}
.empty{text-align:center;color:var(--mut);padding:28px 10px;font-size:14px;line-height:1.6}
.head{font-size:17px;font-weight:700;margin:2px 0 2px}.ctx{font-size:13px;color:var(--mut);line-height:1.5;margin-bottom:6px}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;height:62px;z-index:5}
nav button{flex:1;border:none;background:none;color:var(--mut);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer}
nav button.on{color:var(--blue)}nav svg{width:23px;height:23px}
.soon{font-size:12px;color:var(--amber);background:rgba(185,119,14,.1);border-radius:8px;padding:9px;margin-top:8px;text-align:center}
.perdd{width:auto;display:inline-block;font-size:13px;font-weight:600;padding:8px 30px 8px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);margin-bottom:12px;color:var(--txt)}
.bar{height:7px;background:var(--line);border-radius:4px;margin-top:4px;overflow:hidden}.bar>div{height:100%;border-radius:4px}
nav button{font-size:10.5px}
.x{color:var(--mut);font-size:13px;cursor:pointer;border:none;background:none}
.note{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.55}
.lnk{font-size:12px;color:var(--mut);text-align:center;margin-top:18px;cursor:pointer;text-decoration:underline}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9}
#toast.on{opacity:1}
.acoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}.acoes .btn{margin-top:0;flex:1;min-width:90px;font-size:13px;padding:11px}
@page{margin:1.4cm}@media print{nav,header,.seg,.perbox,.lnk,.acoes,.chev,#btnVoltar,#toast{display:none!important}#printHead{display:block!important;margin-bottom:12px}body{padding:0;background:#fff;color:#000}.wrap{max-width:none;padding:0}.card,.mini,.item{break-inside:avoid;border-color:#ccc}}
</style>
</head>
<body>
<header style="display:flex;align-items:center;gap:8px"><button id="btnVoltar" onclick="voltar()" style="display:none;background:none;border:none;color:#fff;font-size:28px;line-height:1;cursor:pointer;padding:0 4px">‹</button><div style="flex:1"><h1>🃏 Controle TCG</h1><div class="sub">seu controle, no seu bolso</div></div><button class="htop" data-t="simular" onclick="go('simular')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01M8 18h8"/></svg>Simular</button><button class="htop main" data-t="lancar" onclick="go('lancar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Lançar</button></header>
<div class="wrap" id="view"></div>
<div id="toast"></div>
<nav>
  <button data-t="painel" class="on" onclick="go('painel')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3v10zm10 8h8V3h-8v18zM3 21h8v-6H3v6z"/></svg>Painel</button>
  <button data-t="consultar" onclick="irConsultar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Consultar</button>
  <button data-t="contas" onclick="go('contas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20M6 15h4"/></svg>Contas</button>
  <button data-t="relatorios" onclick="go('relatorios')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M8 14v4M13 9v9M18 12v6"/></svg>Relatório</button>
</nav>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ===== NUVEM (multiusuário) — cole a config do Firebase + e-mails pra ativar a sincronização ===== */
const firebaseConfig = {
  apiKey: "AIzaSyB1XzbOlufxe8nKhV0Qr7LUUqmjId2rFbo",
  authDomain: "controle-tcg.firebaseapp.com",
  projectId: "controle-tcg",
  storageBucket: "controle-tcg.firebasestorage.app",
  messagingSenderId: "1055834697410",
  appId: "1:1055834697410:web:8360e6fae238a2de37155b"
};
const EMAILS_OK = ['felypexykawa@gmail.com','pokecentertcgoficial@gmail.com']; /* Felype + operação (Laura). Adicionar mais e-mails aqui quando quiser. */
const USAR_NUVEM = !!(firebaseConfig && firebaseConfig.apiKey);
let _db=null,_auth=null,_syncReady=false,_userEmail='';
const MK='tcg_movs_v2';
const get=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const SEED=[];
let movs=get(MK,[]);
let cats=get('tcg_cats',['ETB','Booster Box','Box da Coleção','Mini BB','Quad','Triple','Case','Sleeved','Blister','Single/Carta','Outro']);
let cols=get('tcg_cols',[]),pess=get('tcg_pess',[]),pgs=get('tcg_pgs',['Dinheiro','Pix','Cartão']);
let colsJ=get('tcg_colsj',null);const colsDe=j=>(colsJ&&colsJ[j])||[];const salvarColsJ=()=>localStorage.setItem('tcg_colsj',JSON.stringify(colsJ));
let jogos=get('tcg_jogos',['Pokémon','Yu-Gi-Oh','One Piece']);
let despCats=get('tcg_despcats',['Luz','Aluguel','Advogado','Internet','Sleeves','Toploader','Sacolas','Fita','Caixas']);
let cadastros=get('tcg_cadastros',[]);const salvarCad=()=>localStorage.setItem('tcg_cadastros',JSON.stringify(cadastros));
let tela='simular',tipoSel='COMPRA',editId=null,perDe='',perAte='',perSel='tudo',consF='tudo',consQ='',consJogo='todos',pgTipo='À vista',canal='Pix',despNat='ordinaria',despStat='pago',despFixa=false,despFreq='mensal',expandId=null,cadTip='cliente',consMenu=false;
let simMat='%',simRev='%',simMatModo='margem',navHist=[],notaItens=[],compraModo='item',notaHead={frete:0,taxa:0,cp:'',sit:'Em estoque',data:''};
let vendaItens=[],vendaModo='item',vendaHead={cp:'',canal:'Pix',taxa:15,recDias:28,conta:'',data:''},relGran='mes',vendaDe='estoque';
let trocaDei=[],trocaRecebi=[],trocaDin=0,deiModo='estoque';
const CATB={'ETB':9,'Booster Box':36,'Box da Coleção':10,'Mini BB':6,'Quad':4,'Triple':3,'Sleeved':1,'Blister':1,'Case':0,'Single/Carta':0,'Outro':0};
movs.forEach(m=>{if(m.cat&&!cats.includes(m.cat))cats.push(m.cat);if(m.colecao&&!cols.includes(m.colecao))cols.push(m.colecao);if(m.contraparte&&!pess.includes(m.contraparte))pess.push(m.contraparte);});
if(!colsJ){colsJ={};jogos.forEach(j=>colsJ[j]=[]);movs.forEach(m=>{const j=m.jogo||'Pokémon';if(!colsJ[j])colsJ[j]=[];if(m.colecao&&!colsJ[j].includes(m.colecao))colsJ[j].push(m.colecao);});if(!colsJ['Pokémon'])colsJ['Pokémon']=[];cols.forEach(c=>{if(!colsJ['Pokémon'].includes(c))colsJ['Pokémon'].push(c);});salvarColsJ();}
const fmt=n=>'R$ '+(Math.round(n*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?'+':'')+Math.round(n*100)+'%';
const dBR=d=>d.toLocaleDateString('pt-BR');
const save=()=>{localStorage.setItem(MK,JSON.stringify(movs));backup();if(USAR_NUVEM&&_syncReady)salvarNuvem();};
const saveL=()=>{localStorage.setItem('tcg_cats',JSON.stringify(cats));localStorage.setItem('tcg_cols',JSON.stringify(cols));localStorage.setItem('tcg_pess',JSON.stringify(pess));localStorage.setItem('tcg_pgs',JSON.stringify(pgs));localStorage.setItem('tcg_jogos',JSON.stringify(jogos));localStorage.setItem('tcg_despcats',JSON.stringify(despCats));localStorage.setItem('tcg_colsj',JSON.stringify(colsJ));if(USAR_NUVEM&&_syncReady)salvarNuvem();};
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1600);}
const sitDe=m=>m.situacao||(m.destino==='Coleção'?'Coleção':'Em estoque');

function motor(){
  const todasC=movs.filter(m=>m.tipo==='COMPRA');
  const compras=todasC.filter(m=>noPer(m.data));
  const vendas=movs.filter(m=>m.tipo==='VENDA'&&noPer(m.data)).map(m=>({data:m.data,receita:(+m.valor||0)*(1-(+m.taxa||0)/100),bruto:+m.valor||0,m}));
  let investido=0,cmv=0;
  for(const m of compras){const v=+m.valor||0;const s=sitDe(m);if(s==='Trocado')continue;investido+=v;if(s==='Vendido')cmv+=v;}
  let estoque=0,colCusto=0;
  for(const m of todasC){const v=+m.valor||0;const s=sitDe(m);if(s==='Em estoque')estoque+=v;else if(s==='Coleção')colCusto+=v;}
  const vendasLiq=vendas.reduce((s,x)=>s+x.receita,0);
  const disp=todasC.filter(m=>sitDe(m)==='Em estoque');
  let despOrd=0,despMat=0;const hojeISO2=new Date().toISOString().slice(0,10);for(const m of movs){if(m.tipo!=='DESPESA'||!noPer(m.data))continue;if(m.status==='apagar'&&!perAte&&m.data>hojeISO2)continue;const v=+m.valor||0;if(m.natureza==='material')despMat+=v;else despOrd+=v;}
  const despTotal=despOrd+despMat;
  return {compras,vendas,investido,cmv,estoque,colCusto,vendasLiq,lucro:vendasLiq-cmv,disp,despOrd,despMat,despTotal,liquido:vendasLiq-cmv-despTotal};
}
function aPagar(){const hoje=new Date();hoje.setHours(0,0,0,0);let L=[];
  movs.filter(m=>m.tipo==='COMPRA'&&m.pgTipo==='Parcelado'&&+m.nParc>0).forEach(m=>{const v=(+m.valor||0)/m.nParc,d0=new Date((m.venc1||m.data)+'T00:00:00');
    for(let i=0;i<+m.nParc;i++){const d=new Date(d0);d.setMonth(d.getMonth()+i);if(d>=hoje)L.push({venc:d,valor:v,m});}});
  movs.filter(m=>m.tipo==='DESPESA'&&m.status==='apagar').forEach(m=>{L.push({venc:new Date((m.data||'')+'T00:00:00'),valor:+m.valor||0,m});});
  return L.sort((a,b)=>a.venc-b.venc);}
function aReceber(){const hoje=new Date();hoje.setHours(0,0,0,0);let L=[];
  movs.filter(m=>m.tipo==='VENDA'&&m.canal==='App'&&+m.recDias>0).forEach(m=>{const d=new Date((m.data||'')+'T00:00:00');d.setDate(d.getDate()+(+m.recDias||0));const liq=(+m.valor||0)*(1-(+m.taxa||0)/100);if(d>=hoje)L.push({data:d,valor:liq,m});});
  return L.sort((a,b)=>a.data-b.data);}
function noPer(d){if(!d)return true;if(perDe&&d<perDe)return false;if(perAte&&d>perAte)return false;return true;}
function setPer(k){perSel=k;const h=new Date(),iso=x=>x.toISOString().slice(0,10);
  if(k==='d30'){const a=new Date(h);a.setDate(a.getDate()-30);perDe=iso(a);perAte='';}
  else if(k==='d90'){const a=new Date(h);a.setDate(a.getDate()-90);perDe=iso(a);perAte='';}
  else if(k==='ano'){perDe=h.getFullYear()+'-01-01';perAte='';}
  else{perDe='';perAte='';}render();}
const PERS=[['d30','30 dias'],['d90','90 dias'],['ano','Este ano'],['tudo','Tudo']];
function selPeriodo(){return `<div class="perbox"><div class="seg" style="margin-bottom:8px">${PERS.map(([k,l])=>`<button class="${perSel===k?'on':''}" onclick="setPer('${k}')">${l}</button>`).join('')}</div>
  <div class="row2"><div><label style="margin:0 0 3px">De</label><input type="date" value="${perDe}" onchange="perDe=this.value;perSel='custom';render()"></div>
    <div><label style="margin:0 0 3px">Até</label><input type="date" value="${perAte}" onchange="perAte=this.value;perSel='custom';render()"></div></div></div>`;}
function snap(){return {tela,consF,consQ,consMenu,perDe,perAte,perSel,editId,tipoSel};}
function go(t){navHist.push(snap());if(navHist.length>40)navHist.shift();if(t==='consultar')consMenu=false;tela=t;editId=null;render();}
function irConsultar(){navHist.push(snap());if(navHist.length>40)navHist.shift();tela='consultar';consMenu=true;consF='tudo';consQ='';editId=null;render();}
function verFiltro(f){consF=f;consMenu=false;consQ='';expandId=null;render();}
function voltar(){const s=navHist.pop();if(!s)return;tela=s.tela;consF=s.consF;consQ=s.consQ;consMenu=s.consMenu;perDe=s.perDe;perAte=s.perAte;perSel=s.perSel;editId=s.editId;tipoSel=s.tipoSel;render();}
function render(){const V={painel:vPainel,lancar:vLancar,consultar:vConsultar,simular:vSimular,relatorios:vRelatorios,contas:vContas};document.getElementById('view').innerHTML=(V[tela]||vPainel)();document.querySelectorAll('nav button,.htop').forEach(b=>b.classList.toggle('on',b.dataset.t===tela));const bv=document.getElementById('btnVoltar');if(bv)bv.style.display=navHist.length?'block':'none';if(tela==='simular')simCalc();}

function vPainel(){
  if(movs.length===0)return `<div class="card"><div class="empty">Sem lançamentos ainda.<br>Comece lançando — ou puxe seu histórico real:</div><div class="btn" style="margin-top:6px" onclick="carregarAcervo()">📥 Carregar minhas compras e vendas</div></div>`;
  const r=motor();const per=perDe||perAte;
  const ap=aPagar(),ar=aReceber();const apT=ap.reduce((s,x)=>s+x.valor,0),arT=ar.reduce((s,x)=>s+x.valor,0);
  const hm=new Date().getMonth(),hy=new Date().getFullYear();
  const apMes=ap.filter(x=>x.venc.getMonth()===hm&&x.venc.getFullYear()===hy).reduce((s,x)=>s+x.valor,0);
  const arMes=ar.filter(x=>x.data.getMonth()===hm&&x.data.getFullYear()===hy).reduce((s,x)=>s+x.valor,0);
  const margem=r.cmv>0?pct(r.lucro/r.cmv)+' sobre o custo':'';
  return `${selPeriodo()}<div class="card"><div class="head">Resultado realizado</div>
      <div style="font-size:30px;font-weight:700;color:${r.lucro>=0?'var(--green)':'var(--red)'};margin:5px 0 3px">${fmt(r.lucro)}</div>
      <div class="ctx">É o que você <b>vendeu</b> (${fmt(r.vendasLiq)} líquido) menos o <b>custo do que saiu</b> (${fmt(r.cmv)}).${margem?' <b>'+margem+'</b>.':''}</div>
      <div class="ctx">Ainda tem <b>${fmt(r.estoque)}</b> em estoque e <b>${fmt(r.colCusto)}</b> em coleção — viram lucro conforme você vende.</div></div>
    ${r.despTotal>0?`<div class="sec">Despesas e resultado líquido</div><div class="grid2"><div class="mini click" onclick="consF='DESPESA';go('consultar')"><div class="k">Despesas</div><div class="v" style="color:var(--red)">${fmt(r.despTotal)}</div><div class="s">ordinária ${fmt(r.despOrd)} · material ${fmt(r.despMat)} →</div></div><div class="mini"><div class="k">Resultado líquido</div><div class="v" style="color:${r.liquido>=0?'var(--green)':'var(--red)'}">${fmt(r.liquido)}</div><div class="s">lucro − despesas</div></div></div>`:''}
    <div class="sec">Onde está o dinheiro</div>
    <div class="grid2">
      <div class="mini click" onclick="consF='COMPRA';go('consultar')"><div class="k">Investido total ${per?'(período)':''}</div><div class="v">${fmt(r.investido+r.despTotal)}</div>${r.despTotal>0?`<div style="font-size:11px;color:var(--mut);margin-top:4px;line-height:1.7">📦 ${fmt(r.investido)} <span style="opacity:.7">mercadoria</span><br>🧾 ${fmt(r.despTotal)} <span style="opacity:.7">infraestrutura</span></div>`:`<div class="s">o que comprou →</div>`}</div>

function selOpts(lista,val){return `<option value="">— selecionar —</option>`+lista.map(x=>`<option ${x===val?'selected':''}>${x}</option>`).join('')+`<option value="__add__">➕ adicionar novo…</option>`;}
function novo(el,tipo){if(el.value!=='__add__'){bcalc();vcalc();return;}const n=(prompt('Adicionar novo:')||'').trim();
  if(n){if(tipo==='col'){const j=document.getElementById('f_jogo')?.value||document.getElementById('n_jogo')?.value||document.getElementById('r_jogo')?.value||document.getElementById('v_jogo')?.value||'Pokémon';if(!colsJ[j])colsJ[j]=[];if(!colsJ[j].includes(n))colsJ[j].push(n);if(!cols.includes(n))cols.push(n);saveL();}else{const L=tipo==='cat'?cats:tipo==='pg'?pgs:tipo==='jogo'?jogos:tipo==='despcat'?despCats:pess;if(!L.includes(n)){L.push(n);saveL();}}const opt=document.createElement('option');opt.text=n;opt.value=n;el.insertBefore(opt,el.querySelector('option[value="__add__"]'));el.value=n;if(tipo==='cat')bdef();}else el.value='';}
function selJogo(el){if(el.value==='__add__'){novo(el,'jogo');}reCol(el.value);}
function reCol(jogo){const sel=document.getElementById('f_col');if(!sel)return;const atual=sel.value;sel.innerHTML=selOpts(colsDe(jogo),colsDe(jogo).includes(atual)?atual:'');}
function reColN(jogo){const sel=document.getElementById('n_col');if(!sel)return;sel.innerHTML=selOpts(colsDe(jogo));}
function reColR(jogo){const sel=document.getElementById('r_col');if(!sel)return;sel.innerHTML=selOpts(colsDe(jogo));}
function togPg(t){pgTipo=t;document.querySelectorAll('#pgtog .o').forEach(o=>o.classList.toggle('on',o.dataset.v===t));document.getElementById('parcDiv').style.display=t==='Parcelado'?'block':'none';}
function togCanal(t){canal=t;document.querySelectorAll('#cntog .o').forEach(o=>o.classList.toggle('on',o.dataset.v===t));document.getElementById('appDiv').style.display=t==='App'?'block':'none';vcalc();}
function setVendaDe(t){vendaDe=t;render();}
function togNat(t){despNat=t;document.querySelectorAll('#nattog .o').forEach(o=>o.classList.toggle('on',o.dataset.v===t));}
function togStat(t){despStat=t;document.querySelectorAll('#stattog .o').forEach(o=>o.classList.toggle('on',o.dataset.v===t));}
function togFixa(v){despFixa=!!v;document.querySelectorAll('#fixtog .o').forEach(o=>o.classList.toggle('on',+o.dataset.v===v));const b=document.getElementById('freqbox');if(b)b.style.display=v?'block':'none';}
function freqChg(v){despFreq=v;const ib=document.getElementById('intbox');if(ib)ib.style.display=v==='dias'?'block':'none';}
function proxData(iso,freq,intD,i){const d=new Date(iso+'T00:00:00');if(freq==='mensal')d.setMonth(d.getMonth()+i);else if(freq==='semanal')d.setDate(d.getDate()+7*i);else if(freq==='anual')d.setFullYear(d.getFullYear()+i);else d.setDate(d.getDate()+(intD||30)*i);return d.toISOString().slice(0,10);}

  } else if(t==='TROCA'){

function bdef(){const c=document.getElementById('f_cat')?.value,b=document.getElementById('f_boo');if(b&&CATB[c]!=null)b.value=CATB[c];bcalc();}
function bcalc(){const c=document.getElementById('calc');if(!c||tipoSel!=='COMPRA')return;const v=+document.getElementById('f_val')?.value||0,q=+document.getElementById('f_qtd')?.value||1,b=+document.getElementById('f_boo')?.value||0;
  let t=q>0&&v>0?`Custo unitário: <b>${fmt(v/q)}</b>.`:'Entra no estoque pelo custo.';if(b>0&&q>0&&v>0)t+=` Custo/booster: <b>${fmt(v/(q*b))}</b>.`;
  if(pgTipo==='Parcelado'){const np=+document.getElementById('f_nparc')?.value||1;if(np>0&&v>0)t+=` ${np}× de <b>${fmt(v/np)}</b>.`;}c.innerHTML=t;}
function vcalc(){const c=document.getElementById('calc');if(!c||tipoSel!=='VENDA')return;
  const v=+document.getElementById('f_val')?.value||0,tax=canal==='App'?(+document.getElementById('f_tax')?.value||0):0,liq=v*(1-tax/100);
  c.innerHTML=`Você recebe <b>${fmt(liq)}</b>${tax>0?` (−${tax}%)`:''}${canal==='App'?', daqui '+(+document.getElementById('f_recdias')?.value||0)+' dias':' na hora'}. Entra como receita — o lucro aparece no painel.`;}
function tcalc(){const c=document.getElementById('calc');if(!c||tipoSel!=='TROCA')return;const custo=(+document.getElementById('f_custou')?.value||0)+(+document.getElementById('f_din')?.value||0);c.innerHTML=custo>0?`A carta entra no acervo a custo de <b>${fmt(custo)}</b> — o que o material + dinheiro te custaram.`:'Informe quanto o material te custou.';}

function simVals(){const g=id=>+document.getElementById(id)?.value||0;const V=g('s_val'),din=g('s_din');let faceMat,custoMat;

function simCalc(){const out=document.getElementById('simout');if(!out)return;const{V,din,faceMat,custoMat,rev,taxa}=simVals();

function chavePer(data,g){const d=new Date(data+'T00:00:00');if(g==='ano')return ''+d.getFullYear();if(g==='mes')return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(g==='semana'){const x=new Date(d);x.setDate(d.getDate()-((d.getDay()+6)%7));return x.toISOString().slice(0,10);}return data;}
function rotuloPer(k,g){if(g==='ano')return k;const p=k.split('-');if(g==='mes')return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][+p[1]-1]+'/'+p[0].slice(2);if(g==='semana')return 'sem de '+p[2]+'/'+p[1];return p[2]+'/'+p[1];}
function timelineHtml(){const B={},hoje=new Date().toISOString().slice(0,10);
  movs.forEach(m=>{if(!m.data||!noPer(m.data))return;const k=chavePer(m.data,relGran),b=B[k]=B[k]||{v:0,g:0,d:0};
    if(m.tipo==='VENDA')b.v+=(+m.valor||0)*(1-(+m.taxa||0)/100);
    else if(m.tipo==='COMPRA'&&!m.origem){b.g+=+m.valor||0;if(m.destino==='Coleção')b.col=(b.col||0)+(+m.valor||0);else b.est=(b.est||0)+(+m.valor||0);}
    else if(m.tipo==='DESPESA'){if(m.status==='apagar'&&!perAte&&m.data>hoje)return;b.d+=+m.valor||0;}});
  const ent=Object.entries(B).sort((a,b)=>a[0]<b[0]?1:-1);
  if(!ent.length)return '<div class="meta">Sem lançamentos no período.</div>';
  const mx=Math.max(...ent.map(([k,b])=>Math.max(b.v,b.g+b.d)),1);
  return ent.map(([k,b])=>{const saldo=b.v-b.g-b.d;return `<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div style="display:flex;justify-content:space-between"><b>${rotuloPer(k,relGran)}</b><b style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</b></div><div class="meta">entrou ${fmt(b.v)} · saiu ${fmt(b.g+b.d)}</div>${(b.g||b.d)?`<div class="meta" style="color:var(--mut)">↳ ${[b.est?fmt(b.est)+' material':'',b.col?fmt(b.col)+' coleção':'',b.d?fmt(b.d)+' despesa':''].filter(Boolean).join(' · ')}</div>`:''}<div style="height:5px;margin-top:4px;background:var(--green);border-radius:3px;width:${Math.max(2,Math.round(b.v/mx*100))}%"></div><div style="height:5px;margin-top:2px;background:var(--red);border-radius:3px;width:${Math.max(2,Math.round((b.g+b.d)/mx*100))}%"></div></div>`;}).join('');}

    <div class="acoes"><button class="btn g" onclick="imprimir()">🖨 Imprimir</button><button class="btn g" onclick="exportarCSV()">⬇ Excel</button><button class="btn g" onclick="baixarBackup()">⬇ Backup</button></div>`;

}
function carregarAcervo(){if(confirm('Voltar ao histórico original (24 compras + 34 vendas da planilha)? Substitui o que está no app agora.')){movs=SEED.map(m=>({...m}));save();fecharModal();go('painel');toast('Histórico original restaurado ✓');}}
function backup(){try{let b=get('tcg_backups',[]);const now=Date.now();const snap={ts:now,n:movs.length,dados:movs.map(m=>({...m}))};if(b.length&&now-b[b.length-1].ts<90000)b[b.length-1]=snap;else b.push(snap);if(b.length>20)b=b.slice(-20);localStorage.setItem('tcg_backups',JSON.stringify(b));}catch(e){}}
function abrirBackup(){const b=get('tcg_backups',[]).slice().sort((x,y)=>y.ts-x.ts);const dt=ts=>new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  const itens=b.length?b.map(x=>`<div class="item" style="justify-content:space-between;align-items:center"><div><b>${dt(x.ts)}</b><div class="meta">${x.n} lançamentos</div></div><button class="x" style="color:var(--blue)" onclick="restaurarBackup(${x.ts})">restaurar</button></div>`).join(''):`<div class="empty">Sem pontos salvos ainda.</div>`;
  const h=`<div id="modal" onclick="if(event.target.id==='modal')fecharModal()" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:flex;align-items:flex-end"><div style="background:var(--card);width:100%;max-width:560px;margin:0 auto;border-radius:16px 16px 0 0;padding:16px;max-height:82vh;overflow:auto">
    <div class="head">Backup e restauração</div>
    <div class="ctx">Seus dados já ficam salvos no app sozinhos. Aqui você guarda uma cópia externa ou volta a um ponto anterior.</div>
    <div class="acoes"><button class="btn g" onclick="baixarBackup()">⬇ Baixar backup</button><button class="btn g" onclick="importarBackup()">⬆ Importar backup</button></div>
    <div class="acoes" style="margin-top:8px"><button class="btn g" onclick="exportarCSV()">⬇ Excel (planilha)</button></div>
    <div class="sec">Voltar a um ponto</div>
    <div class="item" style="justify-content:space-between;align-items:center"><div><b>Histórico original</b><div class="meta">a planilha de origem</div></div><button class="x" style="color:var(--amber)" onclick="carregarAcervo()">restaurar</button></div>
    ${itens}
    <button class="btn" onclick="fecharModal()" style="margin-top:14px">Fechar</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h);}
function fecharModal(){document.getElementById('modal')?.remove();}
function abrirJogos(){
  const lin=jogos.map((j,i)=>{const n=movs.filter(m=>(m.jogo||'Pokémon')===j).length;return `<div class="item" style="justify-content:space-between;align-items:center"><div><b>${j}</b><div class="meta">${n} lançamento${n===1?'':'s'}</div></div><div style="display:flex;gap:14px"><button class="x" style="color:var(--blue)" onclick="renomearJogo(${i})">renomear</button><button class="x" onclick="excluirJogo(${i})">excluir</button></div></div>`;}).join('');
  const h=`<div id="modal" onclick="if(event.target.id==='modal')fecharModal()" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:flex;align-items:flex-end"><div style="background:var(--card);width:100%;max-width:560px;margin:0 auto;border-radius:16px 16px 0 0;padding:16px;max-height:82vh;overflow:auto">
    <div class="sec" style="margin-top:0">Jogos</div>${lin}
    <div class="row2" style="margin-top:12px"><input id="novoJogo" placeholder="novo jogo (ex: Magic)"><button class="btn g" onclick="addJogo()">+ adicionar</button></div>
    <button class="btn" style="margin-top:8px" onclick="fecharModal()">fechar</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h);
}
function addJogo(){const n=(document.getElementById('novoJogo')?.value||'').trim();if(n&&!jogos.includes(n)){jogos.push(n);saveL();}fecharModal();abrirJogos();}
function renomearJogo(i){const antigo=jogos[i],nv=(prompt('Renomear jogo:',antigo)||'').trim();if(!nv||nv===antigo)return;if(jogos.includes(nv)){alert('Já existe um jogo com esse nome.');return;}jogos[i]=nv;movs.forEach(m=>{if((m.jogo||'Pokémon')===antigo)m.jogo=nv;});saveL();save();fecharModal();abrirJogos();}
function excluirJogo(i){if(jogos.length<=1){alert('Precisa ter ao menos 1 jogo.');return;}const j=jogos[i],n=movs.filter(m=>(m.jogo||'Pokémon')===j).length,destino=jogos.find((x,k)=>k!==i);if(n>0&&!confirm(`${n} lançamento(s) usam "${j}". Excluir e mover esses pra "${destino}"?`))return;movs.forEach(m=>{if((m.jogo||'Pokémon')===j)m.jogo=destino;});jogos.splice(i,1);saveL();save();fecharModal();abrirJogos();}
function vCadastros(){
  const tag=t=>t==='fornecedor'?'<span class="tag c">fornecedor</span>':'<span class="tag v">cliente</span>';
  const lin=cadastros.length?cadastros.slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(c=>`<div class="item" style="display:block">
    <div style="display:flex;justify-content:space-between;gap:10px;cursor:pointer" onclick="toggleExp('${c.id}')"><div style="flex:1"><div class="ttl"><b>${c.nome}</b> ${tag(c.tipo)}</div><div class="meta">${[c.doc,c.tel,c.email].filter(Boolean).join(' · ')||'sem dados'} <span class="chev" style="color:var(--mut)">${expandId===c.id?'▾':'›'}</span></div></div></div>
    ${expandId===c.id?`<div style="font-size:12px;color:var(--ink);margin-top:8px;line-height:1.7">${c.doc?`📄 ${c.doc}<br>`:''}${c.tel?`📞 ${c.tel}<br>`:''}${c.email?`✉️ ${c.email}<br>`:''}${c.site?`🌐 ${c.site}<br>`:''}${c.end?`📍 ${c.end}<br>`:''}${c.obs?`📝 ${c.obs}`:''}${!(c.doc||c.tel||c.email||c.site||c.end||c.obs)?'<span style="color:var(--mut)">sem dados preenchidos</span>':''}</div>
      <div style="display:flex;gap:16px;margin-top:9px;padding-top:8px;border-top:1px solid var(--line)"><button class="x" style="color:var(--blue)" onclick="abrirCadastro('${c.id}')">✏️ editar</button><button class="x" onclick="excluirCadastro('${c.id}')">🗑 excluir</button></div>`:''}
  </div>`).join(''):`<div class="empty" style="padding:14px">Nenhum cadastro ainda. Crie o primeiro abaixo.</div>`;
  return `<div class="ctx">Clientes e fornecedores com os dados de contato. Toque num pra ver tudo.</div><button class="btn" onclick="abrirCadastro()">+ novo cadastro</button><div style="margin-top:10px">${lin}</div>`;
}
function abrirCadastro(id){const c=id?cadastros.find(x=>x.id===id):{};cadTip=c.tipo||'cliente';
  const f=(k,lbl,ph,tp)=>`<label>${lbl}</label><input id="cad_${k}" type="${tp||'text'}" value="${(c[k]||'').toString().replace(/"/g,'&quot;')}" placeholder="${ph||''}">`;
  const h=`<div id="modal" onclick="if(event.target.id==='modal')fecharModal()" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:flex;align-items:flex-end"><div style="background:var(--card);width:100%;max-width:560px;margin:0 auto;border-radius:16px 16px 0 0;padding:16px;max-height:88vh;overflow:auto">
    <div class="sec" style="margin-top:0">${id?'Editar cadastro':'Novo cadastro'}</div>
    <label>Tipo</label><div class="toggle" id="cadtiptog"><div class="o ${cadTip==='cliente'?'on':''}" onclick="cadTip='cliente';document.querySelectorAll('#cadtiptog .o').forEach((o,i)=>o.classList.toggle('on',i===0))">Cliente</div><div class="o ${cadTip==='fornecedor'?'on':''}" onclick="cadTip='fornecedor';document.querySelectorAll('#cadtiptog .o').forEach((o,i)=>o.classList.toggle('on',i===1))">Fornecedor</div></div>
    ${f('nome','Nome','nome ou razão social')}${f('doc','CPF / CNPJ')}
    <div class="row2"><div>${f('tel','Telefone','','tel')}</div><div>${f('email','Email','','email')}</div></div>
    ${f('site','Site')}${f('end','Endereço')}${f('obs','Observação')}
    <button class="btn" style="margin-top:12px" onclick="salvarCadastro('${id||''}')">Salvar cadastro</button>
    <button class="btn g" style="margin-top:8px" onclick="fecharModal()">cancelar</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h);}
function salvarCadastro(id){const g=id=>document.getElementById(id)?.value;const nome=(g('cad_nome')||'').trim();if(!nome){alert('Informe ao menos o nome.');return;}
  const antigo=id?(cadastros.find(x=>x.id===id)?.nome||null):null;
  const o={id:id||('c'+Date.now()),tipo:cadTip,nome,doc:g('cad_doc')||'',tel:g('cad_tel')||'',email:g('cad_email')||'',site:g('cad_site')||'',end:g('cad_end')||'',obs:g('cad_obs')||''};
  if(id){const i=cadastros.findIndex(x=>x.id===id);if(i>=0)cadastros[i]=o;}else cadastros.push(o);
  if(antigo&&antigo!==nome){const pi=pess.indexOf(antigo);if(pi>=0)pess[pi]=nome;else if(!pess.includes(nome))pess.push(nome);movs.forEach(m=>{if(m.contraparte===antigo)m.contraparte=nome;});save();}
  else if(!pess.includes(nome))pess.push(nome);
  saveL();salvarCad();fecharModal();render();}
function excluirCadastro(id){if(confirm('Excluir este cadastro?')){cadastros=cadastros.filter(x=>x.id!==id);salvarCad();render();}}
function restaurarBackup(ts){const x=get('tcg_backups',[]).find(y=>y.ts===ts);if(!x)return;if(confirm('Voltar ao ponto de '+new Date(ts).toLocaleString('pt-BR')+'? O estado atual será substituído.')){movs=x.dados.map(m=>({...m}));localStorage.setItem(MK,JSON.stringify(movs));fecharModal();go('painel');toast('Restaurado ✓');}}
function baixarBackup(){const blob=new Blob([JSON.stringify(movs,null,1)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='controle-tcg-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();a.remove();toast('Backup baixado ✓');}
function importarBackup(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);const arr=Array.isArray(d)?d:(Array.isArray(d&&d.movs)?d.movs:(Array.isArray(d&&d.dados)?d.dados:null));
      if(!arr){alert('Arquivo não reconhecido. Use um backup .json gerado pelo próprio app.');return;}
      if(!confirm('Importar '+arr.length+' lançamentos? Isso SUBSTITUI o que está no app agora.'))return;
      movs=arr.map(m=>({...m}));
      arr.forEach(m=>{const j=m.jogo||'Pokémon';if(!jogos.includes(j))jogos.push(j);if(!colsJ[j])colsJ[j]=[];if(m.colecao){if(!colsJ[j].includes(m.colecao))colsJ[j].push(m.colecao);if(!cols.includes(m.colecao))cols.push(m.colecao);}if(m.cat&&!cats.includes(m.cat))cats.push(m.cat);if(m.contraparte&&!pess.includes(m.contraparte))pess.push(m.contraparte);if(m.conta&&!pgs.includes(m.conta))pgs.push(m.conta);});
      save();saveL();fecharModal();go('painel');toast('Backup importado — '+arr.length+' lançamentos ✓');
    }catch(e){alert('Não consegui ler o arquivo: '+e.message);}};
    r.readAsText(f);};
  inp.click();}
function exportarCSV(){const cab=['Data','Tipo','Jogo','Produto','Colecao','Idioma','Qtd','Valor','Situacao','Contraparte','Canal','Taxa%','Pagamento','Parcelas','Observacao'];const esc=c=>`"${(''+(c??'')).replace(/"/g,'""')}"`;
  const linhas=movs.map(m=>[m.data,m.tipo,m.jogo,m.cat,m.colecao,m.idioma,m.qtd,m.valor,m.tipo==='COMPRA'?sitDe(m):'',m.contraparte,m.canal||'',m.taxa||0,m.pgTipo||'',m.nParc||'',m.obs||''].map(esc).join(';'));
  const csv='﻿'+[cab.join(';'),...linhas].join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='controle-tcg-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();toast('Excel baixado ✓');}
function imprimir(){
  const tit=tela==='painel'?'Resumo geral':tela==='relatorios'?'Relatórios':({tudo:'Todos os lançamentos',COMPRA:'Compras',VENDA:'Vendas',ESTOQUE:'Estoque (a custo)',COLECAO:'Coleção (a custo)',DESPESA:'Despesas',CADASTRO:'Cadastros'}[consF]||'Relatório');
  const dBR2=s=>s?s.split('-').reverse().join('/'):'';
  const per=(perDe||perAte)?`Período: ${dBR2(perDe)||'início'} a ${dBR2(perAte)||'hoje'}`:'Período: tudo';
  const jg=(typeof consJogo!=='undefined'&&consJogo&&consJogo!=='todos')?` · ${consJogo}`:'';
  const h=`<div id="printHead" style="display:none"><div style="font-size:18px;font-weight:800;color:#000">Controle TCG — ${tit}${jg}</div><div style="font-size:12px;color:#444;margin-top:2px">${per}</div><div style="font-size:11px;color:#777;margin-top:1px">Gerado em ${new Date().toLocaleString('pt-BR')}</div><hr style="border:none;border-top:1px solid #ccc;margin-top:8px"></div>`;
  document.getElementById('printHead')?.remove();document.body.insertAdjacentHTML('afterbegin',h);window.print();}
function abrir(id){const m=movs.find(x=>x.id===id);if(!m)return;navHist.push(snap());tipoSel=m.tipo;editId=id;tela='lancar';render();}
function excluir(id){const m=movs.find(x=>x.id===id);
  if(m&&m.serieId&&m.status==='apagar'){const n=movs.filter(x=>x.serieId===m.serieId&&x.data>=m.data&&x.status==='apagar').length;
    if(!confirm(`É uma despesa fixa. Excluir esta e as próximas previsões a pagar (${n} no total)?`))return;
    movs=movs.filter(x=>!(x.serieId===m.serieId&&x.data>=m.data&&x.status==='apagar'));save();render();return;}
  if(confirm('Excluir este lançamento?')){movs=movs.filter(x=>x.id!==id);save();render();}}
function marcarPago(id){const m=movs.find(x=>x.id===id);if(m){m.status='pago';save();render();}}
function toggleExp(id){expandId=expandId===id?null:id;render();}
function mudarSit(id){const m=movs.find(x=>x.id===id);if(!m||m.tipo!=='COMPRA')return;const ORD=['Em estoque','Vendido','Coleção'];const px=ORD[(ORD.indexOf(sitDe(m))+1)%3];m.situacao=px;m.destino=px==='Coleção'?'Coleção':'Vender';save();toast('Agora: '+px);render();}
function salvarNuvem(){if(!_db||!_syncReady)return;_db.collection('controle').doc('dados').set({movs,jogos,cats,cols,colsJ,pess,pgs,despCats,cadastros,_upd:Date.now(),_by:_userEmail}).catch(e=>console.warn('nuvem:',e&&e.message));}
function aplicarNuvem(d){if(!d)return;if(Array.isArray(d.movs))movs=d.movs;if(Array.isArray(d.jogos))jogos=d.jogos;if(Array.isArray(d.cats))cats=d.cats;if(Array.isArray(d.cols))cols=d.cols;if(d.colsJ&&typeof d.colsJ==='object')colsJ=d.colsJ;if(Array.isArray(d.pess))pess=d.pess;if(Array.isArray(d.pgs))pgs=d.pgs;if(Array.isArray(d.despCats))despCats=d.despCats;if(Array.isArray(d.cadastros))cadastros=d.cadastros;localStorage.setItem(MK,JSON.stringify(movs));render();}
function loginGoogle(){_auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert('Erro no login: '+(e&&e.message)));}
function sairConta(){if(_auth&&confirm('Sair da conta?')){_syncReady=false;_auth.signOut();}}
function telaLogin(msg){const v=document.getElementById('view');if(v)v.innerHTML=`<div class="card" style="text-align:center;margin:46px auto 0;max-width:360px"><div style="font-size:32px">🃏</div><div class="head" style="justify-content:center;margin-top:6px">Controle TCG</div><div class="ctx">Entre pra acessar seu controle sincronizado em qualquer aparelho.</div>${msg?`<div class="soon" style="color:var(--red);justify-content:center">${msg}</div>`:''}<button class="btn" style="margin-top:16px" onclick="loginGoogle()">Entrar com Google</button></div>`;document.querySelectorAll('nav button,.htop').forEach(b=>b.style.display='none');const bv=document.getElementById('btnVoltar');if(bv)bv.style.display='none';}
function bootNuvem(){try{firebase.initializeApp(firebaseConfig);}catch(e){}_auth=firebase.auth();_db=firebase.firestore();telaLogin('');
  _auth.onAuthStateChanged(u=>{
    if(u&&EMAILS_OK.map(x=>(x||'').toLowerCase()).includes((u.email||'').toLowerCase())){_userEmail=u.email;
      _db.collection('controle').doc('dados').onSnapshot(s=>{const primeiro=!_syncReady;_syncReady=true;if(s.exists)aplicarNuvem(s.data());else salvarNuvem();if(primeiro){document.querySelectorAll('nav button,.htop').forEach(b=>b.style.display='');go('painel');}},e=>telaLogin('Erro de conexão: '+(e&&e.message)));
    }else if(u){_syncReady=false;telaLogin('Sem acesso: '+(u.email||'')+' não está autorizado. Peça pro Felype liberar.');}
    else{_syncReady=false;telaLogin('');}});}
if(USAR_NUVEM){bootNuvem();}
else{if(!localStorage.getItem('tcg_seed_v1')&&Array.isArray(SEED)&&SEED.length){movs=SEED.map(m=>({...m}));save();localStorage.setItem('tcg_seed_v1','1');}render();}
</script>
</body>
